name: Build AppImage

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Oldest supported LTS = oldest glibc = AppImage runs everywhere newer.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps (Qt runtime for icon conversion, libfuse2 for appimagetool)
        run: sudo apt-get update && sudo apt-get install -y libfuse2 libegl1 libgl1 libxkbcommon0
      - name: Run tests
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -e '.[dev]'
          .venv/bin/python -m pytest -q
      - name: Build AppImage
        run: scripts/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: TCLauncher-AppImage
          path: dist/TCLauncher-*-x86_64.AppImage
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TCLauncher-*-x86_64.AppImage
